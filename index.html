<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>COPOMplus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .toast-copia {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

            .toast-copia.visivel {
                opacity: 1;
            }
    </style>
</head>
<body>

    <div class="logo">
        <h1>COPOM+</h1>
        <p class="subtitulo">(Sistema de Auxilio a Ocorrências COPOM)</p>
        <button id="btnTema" onclick="alternarTema()">Modo Noturno</button>
    </div>

    <hr>

    <div class="bloco-contextual">
        <div class="header-container-opcao">
            <label for="natureza"><strong>Categoria da Ocorrência</strong></label>
            <button class="btn-atalho-add" onclick="exibirFormCriarCategoria()" title="Criar Nova Categoria no Banco">➕ Nova Categoria</button>
        </div>
        <select id="natureza">
            <option value="">Carregando...</option>
        </select>
    </div>

    <div id="areaCriarCategoria" class="box-registro-inline" style="display: none;">
        <h3>📁 Criar Nova Categoria</h3>
        <label for="newCatNome">Nome da Categoria:</label>
        <input type="text" id="newCatNome" placeholder="Ex: Contra o Patrimônio">
        <div class="botoes-inline">
            <button onclick="salvarNovaCategoriaBanco()" class="btn-secundario">Salvar Categoria</button>
            <button onclick="fecharFormCriarCategoria()" class="btn-perigo-outline">Cancelar</button>
        </div>
    </div>

    <div id="areaBotaoNovaOpcao" class="bloco-contextual" style="display: none; margin-bottom: 15px;">
        <button class="btn-principal" onclick="exibirFormCriarOpcao()">➕ Registrar Nova Opção/Pergunta nesta Categoria</button>
    </div>

    <div id="areaCriarOpcao" class="box-registro-inline" style="display: none;">
        <h3>📝 Registrar Opção / Pergunta</h3>

        <label for="regTipoCampo">Tipo de Registro:</label>
        <select id="regTipoCampo" onchange="configurarFluxoRegistro();">
            <option value="">-- Selecione o Tipo --</option>
            <option value="bool">Boolean / Toggle</option>
            <option value="integer">Integer</option>
            <option value="inputfield">Inputfield</option>
            <option value="dropdown">Dropdown</option>
        </select>

        <div id="containerPassosDinamicos" style="display: none;">

            <div id="blocoSubtipoDropdown" style="display: none;">
                <label for="regSubtipoDropdown">Origem do Dropdown:</label>
                <select id="regSubtipoDropdown" onchange="configurarSubtipoDropdown();">
                    <option value="novo">Criar um NOVO Dropdown</option>
                    <option value="existente">Adicionar opção a um Dropdown Existente</option>
                </select>
            </div>

            <div id="blocoNomeDropdownNovo" style="display: none;">
                <label for="regNomeDropdownNovo">Nome do Dropdown:</label>
                <input type="text" id="regNomeDropdownNovo" placeholder="Ex: Tipo de Arma">
            </div>

            <div id="blocoDropdownExistente" style="display: none;">
                <label for="regDropdownMae">Selecione o Dropdown Alvo:</label>
                <select id="regDropdownMae">
                    <option value="">Escolha o grupo...</option>
                </select>
            </div>

            <div id="blocoNomeCampoGeral">
                <label id="labelNomeCampoGeral" for="regNomeCampo">Título / Nome da Opção:</label>
                <input type="text" id="regNomeCampo" placeholder="" oninput="atualizarPreviewInline()">
            </div>

            <div id="blocoTextoOutput">
                <label for="regTextoOutput">Texto a ser gerado no 'Resultado do Despacho':</label>
                <input type="text" id="regTextoOutput" placeholder="Escreva a frase base do despacho..." oninput="atualizarPreviewInline()">
                <p id="dicaPlaceholder" class="subtitulo" style="color: var(--cor-destaque); margin-bottom: 10px; display:none;"></p>
            </div>

            <fieldset class="secao-naturezas-inline">
                <legend>Vincular a quais Naturezas?</legend>
                <div class="autocomplete-container">
                    <input type="text" id="buscaNatureza" onkeyup="filtrarNaturezasAutocomplete(this.value)" placeholder="Digite para buscar uma natureza...">
                    <div id="painelSugestoesInstantes" class="painel-sugestoes-busca"></div>
                </div>
                <ul id="listaNaturezasVinculadas" class="tags-naturezas"></ul>
            </fieldset>

            <div class="botoes-inline" style="margin-top: 15px;">
                <button onclick="salvarNovoRegistroInline()" class="btn-secundario">Salvar Registro no Banco</button>
                <button onclick="fecharFormCriarOpcao()" class="btn-perigo-outline">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="camposDinamicos"></div>

    <h2>Resultado do Despacho</h2>

    <div id="zonaPreviewArrastavel" class="despacho-preview-grid" style="display: none;"></div>

    <textarea id="resultado" placeholder="O resultado do despacho aparecerá aqui..." readonly></textarea>

    <div class="botoes-acoes">
        <button onclick="copiarTexto()" class="btn-secundario">Copiar Output</button>
        <button onclick="limparPagina()" class="btn-perigo">Limpar Tudo</button>
    </div>

    <div id="painelSugestoes" class="sugestao-box" style="display: none;">
        <h3>Possíveis Naturezas Sugeridas:</h3>
        <ul id="listaSugestoes"></ul>
    </div>

    <div id="toastCopia" class="toast-copia">Texto copiado com sucesso!</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
