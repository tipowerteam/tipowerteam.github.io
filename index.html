<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Assistência para Atendentes INDRA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-container">
        <h1>SISTEMA DE ASSISTÊNCIA PARA ATENDENTES INDRA</h1>
        <button id="btnTema" onclick="alternarTema()">Modo Noturno</button>
    </div>

    <hr>

    <label for="nomeAtendente">Nome do Atendente</label>
    <input type="text" id="nomeAtendente" placeholder="Ex: Sd. Silva">

    <label for="natureza">Macro Categoria da Ocorrência</label>
    <select id="natureza">
        <option value="">Carregando...</option>
    </select>

    <div id="camposDinamicos"></div>

    <div id="painelSugestoes" class="sugestao-box" style="display: none;">
        <h3>Possíveis Naturezas Sugeridas:</h3>
        <ul id="listaSugestoes"></ul>
    </div>

    <label for="descricao">Informações Complementares</label>
    <textarea id="descricao" placeholder="Digite informações adicionais como características do autor, roupas, direção de fuga..."></textarea>

    <button onclick="gerarTexto()">Gerar Ocorrência</button>

    <h2>Resultado do Despacho</h2>
    <textarea id="resultado" readonly></textarea>

    <script src="script.js"></script>
</body>
</html>
