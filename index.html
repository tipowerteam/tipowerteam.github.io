<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SAOC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <button id="btnAdminToggle" onclick="alternarPainelAdmin()">Painel do Registrador</button>

    <div id="painelAdmin" class="sidebar-admin">
        <div class="sidebar-header">
            <h3>Registrar Opção / Pergunta</h3>
            <button onclick="alternarPainelAdmin()" class="btn-fechar">&times;</button>
        </div>

        <div class="sidebar-body">
            <label for="regAtendente">Quem está registrando?</label>
            <input type="text" id="regAtendente" placeholder="Nome ou Prefixo">

            <label for="regNomeCampo">Nome do Campo / Pergunta</label>
            <input type="text" id="regNomeCampo" placeholder="Ex: Arma Utilizada ou Vítima Ferida?">

            <label for="regTipoCampo">Tipo do Campo</label>
            <select id="regTipoCampo" onchange="alternarCamposRegistro()">
                <option value="bool">Sim/Não (Checkbox/Toggle)</option>
                <option value="dropdown">Opção Selecionável (Dropdown)</option>
                <option value="numero">Numeral (Quantidade)</option>
            </select>

            <div id="areaDropdownConfig" style="display: none;">
                <label for="regValorOpcao">Valor Selecionável da Opção</label>
                <input type="text" id="regValorOpcao" placeholder="Ex: Faca / Revólver">
            </div>

            <label for="regTextoOutput">Texto Gerado no Output (Frase)</label>
            <input type="text" id="regTextoOutput" placeholder="Ex: com o emprego de arma branca,">

            <label for="regOrdem">Prioridade do Texto (Ordem de Exibição)</label>
            <select id="regOrdem">
                <option value="10">Começo do Histórico (10)</option>
                <option value="20">Meio do Histórico - Detalhes Iniciais (20)</option>
                <option value="30">Meio do Histórico - Meios Empregados (30)</option>
                <option value="40">Fim do Histórico - Estado do Local (40)</option>
                <option value="50">Fim do Histórico - Fuga/Rumo (50)</option>
            </select>

            <fieldset class="secao-naturezas">
                <legend>Vincular Naturezas do COPOM</legend>

                <label for="buscaNatureza">Pesquise a Natureza (Autocomplete):</label>
                <input type="text" id="buscaNatureza" list="listaNaturezasCopom" placeholder="Comece a digitar a natureza...">
                <datalist id="listaNaturezasCopom"></datalist>

                <label for="regPeso">Peso / Porcentagem para esta Natureza (0 a 100):</label>
                <div class="input-peso-group">
                    <input type="number" id="regPeso" value="50" min="0" max="100">
                    <button type="button" onclick="adicionarNaturezaNaLista()">Adicionar Vínculo</button>
                </div>

                <ul id="listaNaturezasVinculadas"></ul>
            </fieldset>

            <button onclick="salvarNovoRegistroCompleto()" class="btn-principal" style="width: 100%; margin-top: 15px;">Registrar no Banco</button>
        </div>
    </div>

    <div class="logo">
        <h1>SAOC</h1>
        <p class="subtitulo">(Sistema de Apoio a Ocorrências COPOM)</p>
        <button id="btnTema" onclick="alternarTema()">Modo Noturno</button>
    </div>

    <hr>

    <label for="natureza">Categoria da Ocorrência</label>
    <select id="natureza">
        <option value="">Carregando...</option>
    </select>

    <div id="camposDinamicos"></div>

    <label for="descricao">Informações Complementares (Manual)</label>
    <textarea id="descricao" placeholder="Digite informações adicionais como características, rumo de fuga, roupas..."></textarea>

    <h2>Resultado do Despacho</h2>
    <textarea id="resultado" readonly></textarea>

    <div class="botoes-acoes">
        <button onclick="copiarTexto()" class="btn-secundario">Copiar Output</button>
        <button onclick="limparPagina()" class="btn-perigo">Limpar Tudo</button>
    </div>

    <div id="painelSugestoes" class="sugestao-box" style="display: none;">
        <h3>Possíveis Naturezas Sugeridas:</h3>
        <ul id="listaSugestoes"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
