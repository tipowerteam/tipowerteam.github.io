<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SAOC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <button id="btnAdminToggle" onclick="alternarPainelAdmin()">⚙️ Painel do Registrador</button>

    <div id="painelAdmin" class="sidebar-admin">
        <div class="sidebar-header">
            <h3>Registrar Opção / Pergunta</h3>
            <button onclick="alternarPainelAdmin()" class="btn-fechar">&times;</button>
        </div>

        <div class="sidebar-body">
            <label for="regAtendente">Colaborador:</label>
            <input type="text" id="regAtendente" placeholder="Nome do colaborador">

            <label for="regCategoria">Categoria:</label>
            <select id="regCategoria" onchange="atualizarDropdownsExistentesDaCategoria()">
                <option value="">Selecione uma categoria base...</option>
            </select>

            <label for="regNomeCampo">Título/Opção:</label>
            <input type="text" id="regNomeCampo" placeholder="Nova Circunstância">

            <label for="regTipoCampo">Tipo de Registro:</label>
            <select id="regTipoCampo" onchange="alternarCamposRegistro()">
                <option value="bool">Toggle / Boolean (Sim/Não)</option>
                <option value="numero">Numeral Only (Apenas Números)</option>
                <option value="texto">Campo de Texto Personalizado (Inputfield)</option>
                <option value="dropdown_novo">Dropdown (Criar um Novo)</option>
                <option value="dropdown_existente">Dropdown (Adicionar opção a um Existente)</option>
            </select>

            <div id="areaDropdownExistenteConfig" style="display: none;">
                <label for="regDropdownMae">Selecione o Dropdown Alvo:</label>
                <select id="regDropdownMae">
                    <option value="">Escolha o grupo...</option>
                </select>

                <label for="regValorOpcao">Valor Selecionável da Opção:</label>
                <input type="text" id="regValorOpcao" placeholder="Valor Selecionável">
            </div>

            <div id="areaDropdownNovoConfig" style="display: none;">
                <label for="regValorOpcaoNovo">Primeiro Valor Selecionável deste Dropdown:</label>
                <input type="text" id="regValorOpcaoNovo" placeholder="Valor Selecionável">
            </div>

            <label for="regTextoOutput">Descrição (Texto a ser gerado no Output):</label>
            <input type="text" id="regTextoOutput" placeholder="Pedaço de Texto a ser gerado">

            <label for="regOrdem">Prioridade:</label>
            <input type="number" id="regOrdem" value="10" placeholder="Ex: 10 (Início), 50 (Fim)">

            <fieldset class="secao-naturezas">
                <legend>Naturezas Possíveis (Vincular)</legend>

                <div class="autocomplete-container">
                    <input type="text" id="buscaNatureza" onkeyup="filtrarNaturezasAutocomplete(this.value)" placeholder="Digite uma possivel Natureza">
                    <div id="painelSugestoesInstantes" class="painel-sugestoes-busca"></div>
                </div>

                <label style="margin-top: 10px; display: block;">Naturezas Vinculadas a esta Opção:</label>
                <ul id="listaNaturezasVinculadas" class="tags-naturezas"></ul>
            </fieldset>

            <button onclick="salvarNovoRegistroCompleto()" class="btn-principal" style="width: 100%; margin-top: 15px;">Registrar no Banco de dados</button>
        </div>
    </div>

    <div class="logo">
        <h1>SAOC</h1>
        <p class="subtitulo">(Sistema de Apoio a Ocorrências COPOM)</p>
        <button id="btnTema" onclick="alternarTema()">Modo Noturno</button>
    </div>

    <hr>

    <label for="natureza">Categoria da Ocorrência</label>
    <select id="natureza">
        <option value="">Carregando...</option>
    </select>

    <div id="camposDinamicos"></div>

    <label for="descricao">Informações Complementares (Manual)</label>
    <textarea id="descricao" placeholder="Digite informações adicionais."></textarea>

    <h2>Resultado do Despacho</h2>
    <textarea id="resultado" readonly></textarea>

    <div class="botoes-acoes">
        <button onclick="copiarTexto()" class="btn-secundario">Copiar Output</button>
        <button onclick="limparPagina()" class="btn-perigo">Limpar Tudo</button>
    </div>

    <div id="painelSugestoes" class="sugestao-box" style="display: none;">
        <h3>Possíveis Naturezas Sugeridas:</h3>
        <ul id="listaSugestoes"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
